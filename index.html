<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ryopc | Welcome</title>
  <style>
    :root {
      --bg: #05060a;
      --panel: #0c1018;
      --text: #eaf2ff;
      --muted: #9bb0d6;
      --accent: #3acbff;
      --accent-soft: rgba(58, 203, 255, 0.25);
      --line: rgba(138, 175, 255, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", "Inter", "Noto Sans JP", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(58, 203, 255, 0.14), transparent 35%),
        radial-gradient(circle at 80% 10%, rgba(125, 84, 255, 0.12), transparent 30%),
        linear-gradient(160deg, #030407 0%, #060914 45%, #030407 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(880px, 100%);
      background: linear-gradient(145deg, rgba(12, 16, 24, 0.92), rgba(7, 11, 18, 0.85));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: clamp(28px, 5vw, 56px);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.02) inset,
        0 16px 48px rgba(0, 0, 0, 0.6),
        0 0 32px var(--accent-soft);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(58, 203, 255, 0.08) 35%, transparent 65%);
      transform: translateX(-100%);
      animation: sweep 8s infinite;
      pointer-events: none;
    }

    @keyframes sweep {
      0%, 25% { transform: translateX(-100%); }
      55%, 100% { transform: translateX(100%); }
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      line-height: 1.2;
      letter-spacing: 0.02em;
      margin-bottom: 14px;
      text-shadow: 0 0 18px rgba(58, 203, 255, 0.4);
    }

    p {
      max-width: 62ch;
      color: var(--muted);
      font-size: clamp(0.98rem, 2.2vw, 1.15rem);
      line-height: 1.85;
    }

    .tag {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--accent);
      font-size: 0.83rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(58, 203, 255, 0.06);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="tag">ryopc official</div>
    <h1>Welcome to ryopc's site</h1>
    <p>
      ryopcは、未来志向のアイデアとテクノロジーをつなぎ、クリエイティブな価値を生み出す団体です。
      このサイトでは、活動情報やプロジェクトをシンプルに発信していきます。
    </p>
  </main>
</body>
</html>
